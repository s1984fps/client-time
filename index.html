<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Client Time Widget</title>
<script src="https://api.bitrix24.com/api/v1/"></script>
</head>
<body style="font-family:Arial;padding:10px;">
    <div id="client-time" style="font-size:18px;font-weight:bold;">
        Загрузка времени клиента...
    </div>

<script>
(async () => {
    await BX24.init();

    const placement = BX24.placement.info();
    const entityTypeId = placement.options.entityTypeId;
    const entityId = placement.options.entityId;

    // Загружаем данные сделки/контакта
    const entity = await BX24.callMethod(
        "crm.item.get",
        { entityTypeId, id: entityId }
    );

    // ТВОЁ ПОЛЕ С ГОРОДОМ
    const CITY_FIELD = "UF_CRM_1774629968145";

    const city = entity?.item?.[CITY_FIELD];

    if (!city) {
        document.getElementById("client-time").innerText = "Город не указан";
        return;
    }

    // --- 1. Определяем координаты города через Яндекс Геокодер ---
    const GEOCODER_KEY = "511b6e5f-1d65-400f-9805-3344c6ea8dff";

    const geoUrl =
        `https://geocode-maps.yandex.ru/1.x/?apikey=${GEOCODER_KEY}&format=json&geocode=${encodeURIComponent(city)}`;

    const geo = await fetch(geoUrl).then(r => r.json());

    const pos = geo.response.GeoObjectCollection.featureMember[0].GeoObject.Point.pos.split(" ");
    const lon = pos[0];
    const lat = pos[1];

    // --- 2. Получаем локальное время через Open-Meteo (БЕСПЛАТНО, БЕЗ КЛЮЧЕЙ) ---
    const tzUrl = `https://api.open-meteo.com/v1/timezone?latitude=${lat}&longitude=${lon}`;

    const tz = await fetch(tzUrl).then(r => r.json());

    if (!tz?.datetime) {
        document.getElementById("client-time").innerText = "Ошибка определения времени";
        return;
    }

    let current = new Date(tz.datetime);

    function updateClock() {
        current = new Date(current.getTime() + 1000);
        document.getElementById("client-time").innerText =
            `Текущее время (${city}): ` + current.toLocaleTimeString();
    }

    updateClock();
    setInterval(updateClock, 1000);
})();
</script>
</body>
</html>
